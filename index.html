<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Founder Mission Control</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a2f;
      --muted: #9aa7bd;
      --text: #eaf0ff;
      --accent: #6ea8fe;
      --ok: #2ecc71;
      --warn: #f1c40f;
      --bad: #e74c3c;
      --line: #223152;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1a2752, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    h1 { margin: 0 0 6px; font-size: 32px; }
    .sub { color: var(--muted); margin-bottom: 8px; }
    .meta { color: var(--muted); font-size: 13px; margin-bottom: 18px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    .card {
      background: linear-gradient(180deg, #151f39, var(--card));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,.25);
    }
    .kpi { font-size: 32px; font-weight: 700; margin: 4px 0 0; }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .bar { background:#1f2b4a; border-radius: 999px; height: 10px; overflow: hidden; margin-top:8px; }
    .fill { height:100%; border-radius:999px; }
    .pill { padding: 4px 10px; border-radius:999px; font-size:12px; font-weight:600; white-space:nowrap; display:inline-block; }
    .ok{ background:rgba(46,204,113,.18); color:#9af0be; }
    .warn{ background:rgba(241,196,15,.18); color:#ffe58a; }
    .bad{ background:rgba(231,76,60,.18); color:#ffb0a8; }

    .table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(18,26,47,0.7);
    }
    .table th, .table td {
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
      padding: 12px;
      font-size: 14px;
    }
    .table th {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      background: rgba(9,14,28,.65);
      position: sticky;
      top: 0;
    }
    .table tr:last-child td { border-bottom: none; }
    .small { color: var(--muted); font-size: 12px; }

    @media (max-width: 900px) {
      .table th:nth-child(4), .table td:nth-child(4),
      .table th:nth-child(5), .table td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>
  <h1>Founder Mission Control</h1>
  <div class="sub">Auto-refreshing board for agents, goals, active and pending tasks</div>
  <div class="meta" id="meta">Loading live data...</div>

  <div class="grid">
    <div class="card">
      <div class="label">Top Goal</div>
      <div class="kpi">Execution Velocity</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <span class="small">Progress</span><strong id="goalProgress">0%</strong>
      </div>
      <div class="bar"><div class="fill" id="goalBar" style="width:0%;background:var(--accent)"></div></div>
    </div>

    <div class="card">
      <div class="label">Agent Health</div>
      <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap">
        <span class="pill ok" id="countOk">0 Active</span>
        <span class="pill warn" id="countWarn">0 Watch</span>
        <span class="pill bad" id="countBad">0 Blocked</span>
      </div>
    </div>

    <div class="card">
      <div class="label">Immediate Priorities</div>
      <ul id="priorities" style="margin:8px 0 0 18px"></ul>
    </div>
  </div>

  <table class="table" aria-label="Agent status table">
    <thead>
      <tr>
        <th>Agent</th>
        <th>Status</th>
        <th>Current Goal</th>
        <th>Current Task</th>
        <th>Pending</th>
        <th>Updated</th>
      </tr>
    </thead>
    <tbody id="agentRows"></tbody>
  </table>

  <script>
    const DATA_URLS = [
      'https://raw.githubusercontent.com/aishaassist/mission-control-dashboard/main/live-data.json',
      './live-data.json'
    ];

    function escapeHtml(v) {
      return String(v ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function loadData() {
      let lastErr;
      for (const base of DATA_URLS) {
        try {
          const url = `${base}?t=${Date.now()}`;
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error('Unable to fetch live data');
    }

    function render(snapshot) {
      const generated = snapshot.generatedAt ? new Date(snapshot.generatedAt).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }) : 'Unknown';
      document.getElementById('meta').textContent = `${snapshot.source || 'Live feed'} · Updated ${generated} · Auto-refresh: 30s`;

      const gp = Number(snapshot.goalProgress || 0);
      document.getElementById('goalProgress').textContent = `${gp}%`;
      document.getElementById('goalBar').style.width = `${Math.max(0, Math.min(100, gp))}%`;

      const agents = Array.isArray(snapshot.agents) ? snapshot.agents : [];
      const healthCounts = agents.reduce((acc, a) => {
        const h = a.health || 'warn';
        acc[h] = (acc[h] || 0) + 1;
        return acc;
      }, { ok: 0, warn: 0, bad: 0 });

      document.getElementById('countOk').textContent = `${healthCounts.ok || 0} Active`;
      document.getElementById('countWarn').textContent = `${healthCounts.warn || 0} Watch`;
      document.getElementById('countBad').textContent = `${healthCounts.bad || 0} Blocked`;

      const priorities = document.getElementById('priorities');
      priorities.innerHTML = '';
      (snapshot.priorities || []).forEach(p => {
        const li = document.createElement('li');
        li.textContent = p;
        priorities.appendChild(li);
      });

      const rows = document.getElementById('agentRows');
      rows.innerHTML = '';
      for (const agent of agents) {
        const health = agent.health || 'warn';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${escapeHtml(agent.name)}</strong></td>
          <td><span class="pill ${escapeHtml(health)}">${escapeHtml(agent.status)}</span></td>
          <td>${escapeHtml(agent.goal)}</td>
          <td>${escapeHtml(agent.task)}</td>
          <td>${escapeHtml(agent.pending)}</td>
          <td class="small">${escapeHtml(agent.updated)}</td>
        `;
        rows.appendChild(tr);
      }
    }

    async function refresh() {
      try {
        const data = await loadData();
        render(data);
      } catch (e) {
        document.getElementById('meta').textContent = `Live refresh failed: ${e.message}. Retrying in 30s...`;
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
